<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><style>
@font-face{font-family:Vazirmatn;src:url("file:///android_asset/vazirmatn.ttf") format("truetype");font-display:swap}
:root{--bg:#071426;--surface:#102743;--surface2:#163454;--text:#f5f8fc;--muted:#a9b9cb;--accent:#4b9cff;--focus:#8cc5ff}*{box-sizing:border-box}html,body{width:100%;min-height:100%;overflow-y:auto;overflow-x:hidden}body{margin:0;padding:28px 34px 72px;background:radial-gradient(circle at 80% 10%,#11315b 0,var(--bg) 45%);color:var(--text);font-family:Vazirmatn,Arial,sans-serif;min-height:100vh}body.light{--bg:#edf3f9;--surface:#fff;--surface2:#e4eef8;--text:#17243a;--muted:#607087;--accent:#2479d8;--focus:#095bb8;background:linear-gradient(135deg,#f8fbff,#dce9f6)}header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}.brand{display:flex;align-items:center;gap:14px}.mark{width:54px;height:54px;border-radius:17px;background:linear-gradient(145deg,#19385f,#07111f);display:grid;place-items:center;font-size:32px;font-weight:900;color:#70b6ff;box-shadow:0 12px 30px #0005}.title{font-size:28px;font-weight:800}.sub{font-size:14px;color:var(--muted)}.search{display:flex;gap:10px;margin:12px 0 25px}.search input{flex:1;border:0;border-radius:16px;padding:16px 20px;font-size:21px;background:#f7f9fc;color:#17243a;outline:0}.btn{border:0;border-radius:16px;background:var(--accent);color:white;font-weight:800;font-size:18px;padding:0 26px}.voice{width:62px;padding:0}.section{margin-top:20px}.section h2{font-size:20px;margin:0 0 12px}.grid{display:grid;grid-template-columns:repeat(8,minmax(105px,1fr));gap:12px}.quick{grid-template-columns:repeat(6,minmax(120px,1fr))}.card{min-height:86px;padding:13px;border-radius:16px;background:linear-gradient(145deg,var(--surface2),var(--surface));color:var(--text);text-decoration:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;overflow:hidden;box-shadow:0 7px 20px #0002}.card .ico{font-size:30px;font-weight:900}.card .name{font-size:15px;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card:focus,.btn:focus,input:focus{outline:4px solid var(--focus);transform:scale(1.04)}.empty{color:var(--muted);padding:12px}.tools{display:flex;gap:10px}.small{padding:10px 15px;border-radius:12px;background:var(--surface);color:var(--text);border:0}.g{color:#6eb4ff}.y{color:#ff4747}.s{color:#ff8b24}.c{color:#4ddaa5}.i{color:#79b6ff}@media(max-width:1300px){.grid{grid-template-columns:repeat(6,1fr)}}
</style></head><body><header><div class="brand"><div class="mark">R</div><div><div class="title" id="title">جستجوگر تلویزیونی رها</div><div class="sub">RahaTVBrowser</div></div></div><div class="tools"><button class="small" onclick="act('iptv','')" id="iptv">تلویزیون اینترنتی</button><button class="small" onclick="act('files','')" id="files">رسانه‌های محلی</button><button class="small" onclick="act('settings','')" id="settings">تنظیمات</button></div></header><form class="search" onsubmit="act('search',q.value);return false"><input id="q" autocomplete="off" placeholder="جستجو یا وارد کردن نشانی"><button class="btn voice" type="button" onclick="act('voice','')">●</button><button class="btn" id="searchButton">جستجو</button></form><section class="section"><h2 id="quickTitle">میان‌برهای سریع</h2><div class="grid quick"><button type="button" class="card" onclick="act('open','https://www.google.com')"><span class="ico g">G</span><span class="name">Google</span></button><button type="button" class="card" onclick="act('open','https://www.youtube.com')"><span class="ico y">▶</span><span class="name">YouTube</span></button><button type="button" class="card" onclick="act('open','https://soundcloud.com')"><span class="ico s">☁</span><span class="name">SoundCloud</span></button><button type="button" class="card" onclick="act('open','https://chatgpt.com')"><span class="ico c">◎</span><span class="name">ChatGPT</span></button><button type="button" class="card" onclick="act('open','https://www.wikipedia.org')"><span class="ico i">W</span><span class="name">Wikipedia</span></button><button type="button" class="card" onclick="act('newtab','')"><span class="ico">＋</span><span class="name" id="newTab">تب جدید</span></button></div></section><section class="section"><h2 id="favTitle">علاقه‌مندی‌ها</h2><div class="grid" id="favorites"></div></section><section class="section"><h2 id="recentTitle">بازدیدهای اخیر</h2><div class="grid" id="history"></div></section><script>
function act(a,v){if(window.RahaHome)RahaHome.action(a,v||'')}function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function cards(el,list,empty){el.innerHTML='';if(!list||!list.length){el.innerHTML='<div class="empty">'+empty+'</div>';return}list.forEach(x=>{let a=document.createElement('button');a.type='button';a.className='card';a.onclick=()=>act('open',x.url);a.innerHTML='<span class="ico">◉</span><span class="name">'+esc(x.title)+'</span>';el.appendChild(a)})}window.RahaHomePage={render:function(d){document.documentElement.dir=d.dir;document.documentElement.lang=d.lang;document.body.classList.toggle('light',d.theme==='light');let fa=d.lang==='fa';let t=fa?{title:'جستجوگر تلویزیونی رها',ph:'جستجو یا وارد کردن نشانی',search:'جستجو',quick:'میان‌برهای سریع',fav:'علاقه‌مندی‌ها',recent:'بازدیدهای اخیر',emptyFav:'با دکمه ستاره، سایت‌ها را اضافه کنید',emptyHistory:'هنوز بازدیدی ثبت نشده',iptv:'تلویزیون اینترنتی',files:'رسانه‌های محلی',settings:'تنظیمات',newtab:'تب جدید'}:{title:'Raha TVBROWSER',ph:'Search or enter address',search:'Search',quick:'Quick shortcuts',fav:'Favorites',recent:'Recent visits',emptyFav:'Add sites with the star button',emptyHistory:'No recent visits yet',iptv:'IPTV',files:'Local media',settings:'Settings',newtab:'New tab'};for(let k of ['title','iptv','files','settings'])document.getElementById(k).textContent=t[k];q.placeholder=t.ph;searchButton.textContent=t.search;quickTitle.textContent=t.quick;favTitle.textContent=t.fav;recentTitle.textContent=t.recent;newTab.textContent=t.newtab;cards(favorites,d.favorites,t.emptyFav);cards(history,d.history,t.emptyHistory)}};
</script></body></html>
