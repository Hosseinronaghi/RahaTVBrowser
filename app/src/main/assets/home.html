<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Raha Browser</title>
  <style>
    :root{color-scheme:dark;--bg:#0b1020;--panel:#11182a;--card:#1b2741;--accent:#68a4ff;--text:#f7faff;--muted:#aebbd1}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -20%,#1e4074 0,#0b1020 46%);font-family:system-ui,-apple-system,sans-serif;color:var(--text);padding:6vh 7vw;overflow-x:hidden}
    .wrap{max-width:1500px;margin:auto}.brand{display:flex;align-items:center;gap:20px;margin-bottom:6vh}.logo{width:74px;height:74px;border-radius:23px;background:var(--accent);display:grid;place-items:center;color:#0b1020;font-size:38px;font-weight:900;box-shadow:0 14px 40px #0007}.brand h1{font-size:42px;margin:0}.brand p{font-size:20px;color:var(--muted);margin:8px 0 0}
    form{display:flex;direction:ltr;gap:12px;margin-bottom:6vh}input{flex:1;min-height:68px;border:2px solid transparent;border-radius:18px;background:#f8fbff;color:#101828;font-size:23px;padding:0 24px;outline:none}button{min-width:130px;border:0;border-radius:18px;background:var(--accent);color:#07101f;font-size:21px;font-weight:800}
    h2{font-size:26px;margin:0 0 24px}.grid{display:grid;grid-template-columns:repeat(5,minmax(160px,1fr));gap:22px;direction:ltr}.card{display:flex;min-height:150px;flex-direction:column;justify-content:space-between;text-decoration:none;background:linear-gradient(145deg,#223256,#141e34);border:3px solid transparent;border-radius:24px;padding:25px;color:var(--text);transition:.12s transform,.12s border-color}.card:focus,.card:hover{outline:none;border-color:#fff;transform:scale(1.055);box-shadow:0 18px 45px #0008}.icon{font-size:38px}.name{font-size:23px;font-weight:750}.hint{margin-top:6vh;padding:20px 24px;border-radius:18px;background:#11182acc;color:var(--muted);font-size:18px;line-height:1.8}
    @media(max-width:1000px){.grid{grid-template-columns:repeat(3,1fr)}.brand h1{font-size:34px}}
  </style>
</head>
<body>
<div class="wrap">
  <header class="brand"><div class="logo">R</div><div><h1>Raha Browser</h1><p>مرور وب با ریموت، موس یا کیبورد</p></div></header>
  <form action="https://www.google.com/search" method="get"><input name="q" aria-label="جست‌وجو" placeholder="جست‌وجو در وب…"><button type="submit">جست‌وجو</button></form>
  <h2>دسترسی سریع</h2>
  <main class="grid">
    <a class="card" href="https://www.google.com/"><span class="icon">G</span><span class="name">Google</span></a>
    <a class="card" href="https://www.youtube.com/tv"><span class="icon">▶</span><span class="name">YouTube TV</span></a>
    <a class="card" href="https://www.wikipedia.org/"><span class="icon">W</span><span class="name">Wikipedia</span></a>
    <a class="card" href="https://www.twitch.tv/"><span class="icon">◫</span><span class="name">Twitch</span></a>
    <a class="card" href="https://news.google.com/"><span class="icon">N</span><span class="name">Google News</span></a>
  </main>
  <div class="hint">دکمه Menu ریموت، حالت نشانگر را روشن یا خاموش می‌کند. در حالت نشانگر با کلیدهای جهت‌دار حرکت کنید و با OK کلیک کنید.</div>
</div>
</body>
</html>
