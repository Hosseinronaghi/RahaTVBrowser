name: RahaTVBrowser build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Validate and build APKs plus AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Validate Android resources
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "app/src/main/res" ]; then
            echo "Android resource directory was not found."
            exit 1
          fi

          bad_files="$(
            find app/src/main/res -type f               ! \(                 -name '*.xml' -o                 -name '*.png' -o                 -name '*.webp' -o                 -name '*.jpg' -o                 -name '*.jpeg' -o                 -name '*.ttf' -o                 -name '*.otf' -o                 -name '*.ttc'               \) -print
          )"

          if [ -n "$bad_files" ]; then
            echo "Invalid files inside app/src/main/res:"
            printf '%s\n' "$bad_files"
            exit 1
          fi

          duplicate_resources="$(
            find app/src/main/res -type f -printf '%h/%f\n'               | awk '
                  {
                    full=$0
                    name=$0
                    sub(/^.*\//, "", name)
                    sub(/\.[^.]+$/, "", name)

                    dir=full
                    sub(/\/[^/]+$/, "", dir)

                    key=dir "/" name
                    count[key]++
                    files[key]=files[key] "\n  - " full
                  }
                  END {
                    for (key in count) {
                      if (count[key] > 1) {
                        print key files[key]
                      }
                    }
                  }
                '
          )"

          if [ -n "$duplicate_resources" ]; then
            echo "Duplicate Android resource names detected:"
            printf '%s\n' "$duplicate_resources"
            exit 1
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.13'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager             'platforms;android-36'             'build-tools;35.0.0'             'platform-tools'

      - name: Prepare optional permanent signing
        shell: bash
        env:
          RAHA_KEYSTORE_BASE64: ${{ secrets.RAHA_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RAHA_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RAHA_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RAHA_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -n "${RAHA_KEYSTORE_BASE64:-}" ]; then
            if [ -z "${STORE_PASSWORD:-}" ] ||                [ -z "${KEY_ALIAS:-}" ] ||                [ -z "${KEY_PASSWORD:-}" ]; then
              echo "The keystore secret exists, but one or more signing secrets are missing."
              exit 1
            fi

            printf '%s' "$RAHA_KEYSTORE_BASE64"               | base64 --decode               > "$GITHUB_WORKSPACE/app/raha-release.jks"

            echo "RAHA_SIGNING_ENABLED=true" >> "$GITHUB_ENV"
            echo "RAHA_KEYSTORE_FILE=$GITHUB_WORKSPACE/app/raha-release.jks" >> "$GITHUB_ENV"
            echo "RAHA_KEYSTORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
            echo "RAHA_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
            echo "RAHA_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"

            echo "Permanent release signing is enabled."
          else
            echo "RAHA_SIGNING_ENABLED=false" >> "$GITHUB_ENV"
            echo "Permanent release signing is not configured."
          fi

      - name: Build split and universal APKs
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace :app:assembleCompact

      - name: Build release AAB
        shell: bash
        run: |
          set -euo pipefail
          gradle --no-daemon --stacktrace             -PrahaBundleBuild=true             :app:bundleRelease

      - name: Collect and inspect outputs
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-files

          echo "Generated Android outputs:"
          find app/build/outputs -type f | sort

          ARM64="$(
            find app/build/outputs/apk/compact -type f -name '*.apk'               | grep -Ei 'arm64|v8a'               | grep -Evi 'universal'               | head -n 1 || true
          )"

          ARM32="$(
            find app/build/outputs/apk/compact -type f -name '*.apk'               | grep -Ei 'armeabi|v7a'               | grep -Evi 'universal'               | head -n 1 || true
          )"

          UNIVERSAL="$(
            find app/build/outputs/apk/compact -type f -name '*.apk'               | grep -Ei 'universal'               | head -n 1 || true
          )"

          AAB="$(
            find app/build/outputs/bundle/release -type f -name '*.aab'               | head -n 1 || true
          )"

          for required_file in "$ARM64" "$ARM32" "$UNIVERSAL" "$AAB"; do
            if [ -z "$required_file" ] || [ ! -f "$required_file" ]; then
              echo "One or more expected build outputs were not produced."
              exit 1
            fi
          done

          cp "$ARM64"             release-files/RahaTVBrowser-arm64-v8a.apk

          cp "$ARM32"             release-files/RahaTVBrowser-armeabi-v7a.apk

          cp "$UNIVERSAL"             release-files/RahaTVBrowser-universal.apk

          cp "$AAB"             release-files/RahaTVBrowser-release.aab

          (
            cd release-files
            sha256sum RahaTVBrowser-* > SHA256SUMS.txt
          )

          echo "Release files:"
          ls -lh release-files
          echo
          cat release-files/SHA256SUMS.txt

      - name: Upload outputs
        uses: actions/upload-artifact@v7
        with:
          name: raha-tv-browser-debug-and-unsigned-bundle
          path: release-files/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
