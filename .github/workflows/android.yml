name: RahaTVBrowser build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Decode persistent signing key
        if: ${{ secrets.RAHA_KEYSTORE_BASE64 != '' }}
        env:
          RAHA_KEYSTORE_BASE64: ${{ secrets.RAHA_KEYSTORE_BASE64 }}
        run: echo "$RAHA_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/raha-upload.jks"

      - name: Build two optimized APKs
        env:
          RAHA_KEYSTORE_PATH: ${{ secrets.RAHA_KEYSTORE_BASE64 != '' && format('{0}/raha-upload.jks', runner.temp) || '' }}
          RAHA_KEYSTORE_PASSWORD: ${{ secrets.RAHA_KEYSTORE_PASSWORD }}
          RAHA_KEY_ALIAS: ${{ secrets.RAHA_KEY_ALIAS }}
          RAHA_KEY_PASSWORD: ${{ secrets.RAHA_KEY_PASSWORD }}
        run: gradle --no-daemon --stacktrace :app:assembleCompact

      - name: Build Play Store AAB
        env:
          RAHA_KEYSTORE_PATH: ${{ secrets.RAHA_KEYSTORE_BASE64 != '' && format('{0}/raha-upload.jks', runner.temp) || '' }}
          RAHA_KEYSTORE_PASSWORD: ${{ secrets.RAHA_KEYSTORE_PASSWORD }}
          RAHA_KEY_ALIAS: ${{ secrets.RAHA_KEY_ALIAS }}
          RAHA_KEY_PASSWORD: ${{ secrets.RAHA_KEY_PASSWORD }}
        run: gradle --no-daemon --stacktrace -PrahaBundleBuild=true :app:bundleRelease

      - name: Prepare named outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          ARM64_APK="$(find app/build/outputs/apk/compact -type f -name '*.apk' | grep 'arm64-v8a' | head -n 1)"
          ARMV7_APK="$(find app/build/outputs/apk/compact -type f -name '*.apk' | grep 'armeabi-v7a' | head -n 1)"
          RELEASE_AAB="$(find app/build/outputs/bundle/release -type f -name '*.aab' | head -n 1)"
          cp "$ARM64_APK" dist/RahaTVBrowser-arm64-v8a.apk
          cp "$ARMV7_APK" dist/RahaTVBrowser-armeabi-v7a.apk
          cp "$RELEASE_AAB" dist/RahaTVBrowser-release.aab
          (cd dist && sha256sum *.apk *.aab > SHA256SUMS.txt)
          ls -lh dist

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: raha-tv-browser-debug-and-unsigned-bundle
          path: dist/*
          if-no-files-found: error
          compression-level: 9
