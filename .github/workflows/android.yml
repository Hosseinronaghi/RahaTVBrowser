name: RahaTVBrowser build

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build APKs and AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android SDK 36
        run: |
          sdkmanager "platforms;android-36"
          sdkmanager "build-tools;35.0.0"

      - name: Prepare optional signing keystore
        env:
          RAHA_KEYSTORE_BASE64: ${{ secrets.RAHA_KEYSTORE_BASE64 }}
          RAHA_KEYSTORE_PASSWORD: ${{ secrets.RAHA_KEYSTORE_PASSWORD }}
          RAHA_KEY_ALIAS: ${{ secrets.RAHA_KEY_ALIAS }}
          RAHA_KEY_PASSWORD: ${{ secrets.RAHA_KEY_PASSWORD }}
        run: |
          if [ -n "$RAHA_KEYSTORE_BASE64" ]; then
            echo "$RAHA_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/app/raha-release.jks"

            echo "RAHA_KEYSTORE_FILE=$GITHUB_WORKSPACE/app/raha-release.jks" >> "$GITHUB_ENV"
            echo "RAHA_KEYSTORE_PASSWORD=$RAHA_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "RAHA_KEY_ALIAS=$RAHA_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "RAHA_KEY_PASSWORD=$RAHA_KEY_PASSWORD" >> "$GITHUB_ENV"
            echo "RAHA_SIGNING_ENABLED=true" >> "$GITHUB_ENV"

            echo "Signing keystore prepared."
          else
            echo "RAHA_SIGNING_ENABLED=false" >> "$GITHUB_ENV"
            echo "No signing secrets configured. Test APKs will still be built."
          fi

      - name: Build compact per-ABI APKs
        run: |
          gradle --no-daemon --stacktrace :app:assembleCompact

      - name: Build optimized release AAB
        run: |
          gradle --no-daemon --stacktrace -PrahaBundleBuild=true :app:bundleRelease

      - name: Collect and rename outputs
        shell: bash
        run: |
          set -e

          mkdir -p release-files

          ARM64_APK=$(find app/build/outputs/apk/compact -type f -name "*.apk" | grep -E "arm64|v8a" | head -n 1 || true)
          ARM32_APK=$(find app/build/outputs/apk/compact -type f -name "*.apk" | grep -E "armeabi|v7a" | head -n 1 || true)
          RELEASE_AAB=$(find app/build/outputs/bundle/release -type f -name "*.aab" | head -n 1 || true)

          if [ -z "$ARM64_APK" ]; then
            echo "arm64-v8a APK was not found."
            find app/build/outputs -type f || true
            exit 1
          fi

          if [ -z "$ARM32_APK" ]; then
            echo "armeabi-v7a APK was not found."
            find app/build/outputs -type f || true
            exit 1
          fi

          if [ -z "$RELEASE_AAB" ]; then
            echo "Release AAB was not found."
            find app/build/outputs -type f || true
            exit 1
          fi

          cp "$ARM64_APK" "release-files/RahaTVBrowser-arm64-v8a.apk"
          cp "$ARM32_APK" "release-files/RahaTVBrowser-armeabi-v7a.apk"
          cp "$RELEASE_AAB" "release-files/RahaTVBrowser-release.aab"

          echo "Generated files:"
          ls -lh release-files

      - name: Create SHA-256 checksums
        working-directory: release-files
        run: |
          sha256sum \
            RahaTVBrowser-arm64-v8a.apk \
            RahaTVBrowser-armeabi-v7a.apk \
            RahaTVBrowser-release.aab \
            > SHA256SUMS.txt

          cat SHA256SUMS.txt

      - name: Upload APK and AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: raha-tv-browser-debug-and-unsigned-bundle
          path: release-files/*
          if-no-files-found: error
          retention-days: 30
