name: Android build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Install Android SDK 36
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Build debug APK and release AAB
        run: gradle --no-daemon :app:assembleDebug :app:bundleRelease

      - name: Create SHA-256 checksums
        run: |
          find app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \) -print0 | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Upload APK and AAB
        uses: actions/upload-artifact@v4
        with:
          name: raha-browser-debug-and-unsigned-bundle
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/bundle/release/*.aab
            SHA256SUMS.txt
